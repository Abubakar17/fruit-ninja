<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FRUIT NINJA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0a0a12; cursor: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Arial Black",
                 Roboto, system-ui, sans-serif;
    user-select: none; -webkit-user-select: none;
  }
  #game { display: block; position: absolute; inset: 0; }
</style>
</head>
<body>
  <canvas id="game"></canvas>
<script>
"use strict";
(function () {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  let W = 0, H = 0, DPR = 1;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  // ------------------------------------------------------------- input
  // The phone drives real OS mouse events: mousedown -> mousemove... -> mouseup.
  // We slice whenever the pointer MOVES while the button is held.
  const mouse = { x: W / 2, y: H / 2, px: W / 2, py: H / 2, down: false };
  const blade = []; // recent points for the on-screen blade trail

  function setPos(x, y) {
    mouse.px = mouse.x; mouse.py = mouse.y;
    mouse.x = x; mouse.y = y;
    if (mouse.down) {
      blade.push({ x: x, y: y, t: performance.now() });
      if (blade.length > 20) blade.shift();
    }
  }
  window.addEventListener("mousemove", function (e) { setPos(e.clientX, e.clientY); });
  window.addEventListener("mousedown", function (e) {
    mouse.down = true; mouse.px = mouse.x; mouse.py = mouse.y;
    blade.length = 0;
    blade.push({ x: e.clientX, y: e.clientY, t: performance.now() });
    handleClick(e.clientX, e.clientY);
  });
  window.addEventListener("mouseup", function () { mouse.down = false; });
  // Pointer/touch fallbacks so it's also playable directly on a touchscreen.
  window.addEventListener("pointermove", function (e) { setPos(e.clientX, e.clientY); });
  window.addEventListener("pointerdown", function (e) {
    mouse.down = true; blade.length = 0;
    blade.push({ x: e.clientX, y: e.clientY, t: performance.now() });
  });
  window.addEventListener("pointerup", function () { mouse.down = false; });
  window.addEventListener("contextmenu", function (e) { e.preventDefault(); });

  // ------------------------------------------------------------- game state
  const STATE = { MENU: 0, PLAY: 1, OVER: 2 };
  let state = STATE.MENU;
  let score = 0, best = 0, lives = 3;
  let fruits = [], particles = [], pops = [];
  let spawnTimer = 0, spawnGap = 900, gameTime = 0;
  const GRAV = 1400; // px/s^2

  const KINDS = [
    { name: "watermelon", r: 46, color: "#3bd16f", inner: "#ff4d6d", juice: "#ff4d6d" },
    { name: "orange",     r: 34, color: "#ff9f1c", inner: "#ffbf69", juice: "#ff9f1c" },
    { name: "apple",      r: 33, color: "#ef233c", inner: "#f7e1c9", juice: "#ff5d73" },
    { name: "lemon",      r: 30, color: "#ffd60a", inner: "#fff3b0", juice: "#ffe45e" },
    { name: "plum",       r: 31, color: "#9d4edd", inner: "#e0aaff", juice: "#c77dff" },
    { name: "kiwi",       r: 30, color: "#6a994e", inner: "#a7c957", juice: "#a7c957" },
  ];

  function rand(a, b) { return a + Math.random() * (b - a); }

  function spawnWave() {
    const n = Math.random() < 0.35 ? 2 + (Math.random() * 2 | 0) : 1;
    for (let i = 0; i < n; i++) {
      const isBomb = Math.random() < Math.min(0.16, 0.06 + gameTime * 0.003);
      const kind = KINDS[(Math.random() * KINDS.length) | 0];
      const r = isBomb ? 34 : kind.r;
      const x = rand(W * 0.12, W * 0.88);
      // Launch so the arc's apex lands in the UPPER part of the screen (in view).
      // From v^2 = 2*g*rise, the exact velocity to peak at apexY:
      const apexY = rand(H * 0.08, H * 0.34);
      const rise = (H + r) - apexY;
      const vy = -Math.sqrt(2 * GRAV * rise);
      // Drift a bit toward center so fruit doesn't sail off the side.
      const vx = (W / 2 - x) * rand(0.15, 0.5) + rand(-120, 120);
      fruits.push({
        x: x, y: H + r,
        vx: vx,
        vy: vy,
        r: r,
        rot: 0, vrot: rand(-4, 4),
        kind: kind, bomb: isBomb,
        sliced: false, counted: false,
      });
    }
  }

  function reset() {
    fruits = []; particles = []; pops = [];
    score = 0; lives = 3; gameTime = 0; spawnTimer = 0; spawnGap = 900;
  }

  function handleClick(x, y) {
    if (state === STATE.MENU) { reset(); state = STATE.PLAY; }
    else if (state === STATE.OVER) { reset(); state = STATE.PLAY; }
  }

  // ------------------------------------------------------------- slicing
  // distance from point P to segment AB
  function segDist(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const len2 = dx * dx + dy * dy;
    let t = len2 ? ((px - ax) * dx + (py - ay) * dy) / len2 : 0;
    t = t < 0 ? 0 : t > 1 ? 1 : t;
    const cx = ax + t * dx, cy = ay + t * dy;
    return Math.hypot(px - cx, py - cy);
  }

  function trySlice() {
    if (!mouse.down) return;
    const speed = Math.hypot(mouse.x - mouse.px, mouse.y - mouse.py);
    if (speed < 2) return; // must actually be swishing
    for (const f of fruits) {
      if (f.sliced) continue;
      if (segDist(f.x, f.y, mouse.px, mouse.py, mouse.x, mouse.y) < f.r + 12) {
        sliceFruit(f);
      }
    }
  }

  function sliceFruit(f) {
    f.sliced = true;
    const ang = Math.atan2(mouse.y - mouse.py, mouse.x - mouse.px);
    if (f.bomb) {
      // boom
      for (let i = 0; i < 60; i++) {
        particles.push(mkPart(f.x, f.y, "#ff5a3c"));
        particles.push(mkPart(f.x, f.y, "#ffd166"));
      }
      pops.push({ x: f.x, y: f.y, t: performance.now(), text: "BOOM", color: "#ff5a3c" });
      lives = 0; // instant loss
      return;
    }
    score += 1;
    if (score > best) best = score;
    // two halves flying apart perpendicular to the cut
    const perp = ang + Math.PI / 2;
    f.halves = [
      { off: perp, x: f.x, y: f.y, vx: Math.cos(perp) * 120 + f.vx * 0.4,
        vy: Math.sin(perp) * 120 + f.vy * 0.6, rot: f.rot, vrot: rand(-3, 3), side: 1 },
      { off: perp, x: f.x, y: f.y, vx: -Math.cos(perp) * 120 + f.vx * 0.4,
        vy: -Math.sin(perp) * 120 + f.vy * 0.6, rot: f.rot, vrot: rand(-3, 3), side: -1 },
    ];
    f.cutAng = ang;
    for (let i = 0; i < 22; i++) particles.push(mkPart(f.x, f.y, f.kind.juice));
    pops.push({ x: f.x, y: f.y, t: performance.now(), text: "+1", color: f.kind.juice });
  }

  function mkPart(x, y, color) {
    const a = rand(0, Math.PI * 2), s = rand(40, 340);
    return { x: x, y: y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 80,
             r: rand(2, 6), color: color, life: 1, t: performance.now() };
  }

  // ------------------------------------------------------------- update
  let last = performance.now();
  function update(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;

    if (state === STATE.PLAY) {
      gameTime += dt;
      spawnTimer += dt * 1000;
      spawnGap = Math.max(420, 900 - gameTime * 6);
      if (spawnTimer >= spawnGap) { spawnTimer = 0; spawnWave(); }

      trySlice();

      for (const f of fruits) {
        f.vy += GRAV * dt;
        f.x += f.vx * dt; f.y += f.vy * dt; f.rot += f.vrot * dt;
        if (f.sliced && f.halves) {
          for (const h of f.halves) {
            h.vy += GRAV * dt;
            h.x += h.vx * dt; h.y += h.vy * dt; h.rot += h.vrot * dt;
          }
        }
        // a fruit (not bomb) that falls off the bottom un-sliced costs a life
        if (!f.counted && !f.sliced && f.y - f.r > H + 40) {
          f.counted = true;
          if (!f.bomb) { lives -= 1; pops.push(
            { x: f.x < 60 ? 60 : f.x > W - 60 ? W - 60 : f.x, y: H - 60,
              t: performance.now(), text: "MISS", color: "#ff3b57" }); }
        }
      }
      fruits = fruits.filter(f => f.y - f.r < H + 120 &&
        !(f.sliced && f.halves && f.halves.every(h => h.y - f.r > H + 120)));

      if (lives <= 0) { state = STATE.OVER; }
    }

    for (const p of particles) {
      p.vy += GRAV * 0.6 * dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.life -= dt * 1.6;
    }
    particles = particles.filter(p => p.life > 0);
    pops = pops.filter(p => now - p.t < 800);

    render(now);
    requestAnimationFrame(update);
  }

  // ------------------------------------------------------------- render
  function render(now) {
    // background
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#141026"); g.addColorStop(1, "#07060d");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // fruits
    for (const f of fruits) {
      if (f.sliced && f.halves) drawHalves(f);
      else if (!f.sliced) drawFruit(f);
    }

    // particles (juice)
    ctx.globalCompositeOperation = "lighter";
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";

    // score pops
    for (const p of pops) {
      const a = 1 - (now - p.t) / 800;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = p.color;
      ctx.font = "900 26px " + fontStack();
      ctx.textAlign = "center";
      ctx.fillText(p.text, p.x, p.y - (1 - a) * 40);
    }
    ctx.globalAlpha = 1;

    drawBlade(now);
    drawHUD();

    if (state === STATE.MENU) drawCenter("FRUIT NINJA", "swipe to start");
    if (state === STATE.OVER) drawCenter("GAME OVER", "score " + score + "  •  swipe to retry");
  }

  function fontStack() {
    return '-apple-system, "Segoe UI", "Arial Black", Roboto, system-ui, sans-serif';
  }

  function drawFruit(f) {
    ctx.save();
    ctx.translate(f.x, f.y); ctx.rotate(f.rot);
    if (f.bomb) {
      ctx.fillStyle = "#1b1b22";
      ctx.beginPath(); ctx.arc(0, 0, f.r, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#3a3a46"; ctx.lineWidth = 3; ctx.stroke();
      // highlight
      ctx.fillStyle = "rgba(255,255,255,.25)";
      ctx.beginPath(); ctx.arc(-f.r * 0.3, -f.r * 0.35, f.r * 0.25, 0, Math.PI * 2); ctx.fill();
      // fuse
      ctx.strokeStyle = "#c98b3a"; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(0, -f.r); ctx.quadraticCurveTo(14, -f.r - 16, 4, -f.r - 26); ctx.stroke();
      ctx.fillStyle = "#ffb703";
      ctx.beginPath(); ctx.arc(4, -f.r - 28, 4, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = f.kind.color;
      ctx.beginPath(); ctx.arc(0, 0, f.r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,.22)";
      ctx.beginPath(); ctx.arc(-f.r * 0.32, -f.r * 0.34, f.r * 0.24, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  function drawHalves(f) {
    for (const h of f.halves) {
      ctx.save();
      ctx.translate(h.x, h.y); ctx.rotate(h.rot);
      // clip to a half circle along the cut
      ctx.beginPath();
      ctx.arc(0, 0, f.r, f.cutAng + Math.PI / 2, f.cutAng - Math.PI / 2, h.side < 0);
      ctx.closePath();
      ctx.fillStyle = f.kind.color; ctx.fill();
      ctx.clip();
      // exposed inner flesh
      ctx.fillStyle = f.kind.inner;
      ctx.beginPath(); ctx.arc(0, 0, f.r * 0.82, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  }

  function drawBlade(now) {
    if (blade.length < 2) return;
    ctx.globalCompositeOperation = "lighter";
    ctx.lineCap = "round"; ctx.lineJoin = "round";
    for (let i = 1; i < blade.length; i++) {
      const a = i / blade.length;
      ctx.strokeStyle = "rgba(255,60,170," + (0.14 * a).toFixed(3) + ")";
      ctx.lineWidth = 22 * a + 4; seg(blade[i - 1], blade[i]);
      ctx.strokeStyle = "rgba(255,150,50," + (0.4 * a).toFixed(3) + ")";
      ctx.lineWidth = 11 * a + 2; seg(blade[i - 1], blade[i]);
      ctx.strokeStyle = "rgba(255,255,255," + (0.85 * a).toFixed(3) + ")";
      ctx.lineWidth = 3.5 * a + 1; seg(blade[i - 1], blade[i]);
    }
    ctx.globalCompositeOperation = "source-over";
    // fade the trail when not actively slicing
    if (!mouse.down && blade.length) blade.shift();
  }
  function seg(a, b) { ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke(); }

  function drawHUD() {
    if (state === STATE.MENU) return;
    ctx.fillStyle = "#fff";
    ctx.font = "900 30px " + fontStack();
    ctx.textAlign = "left";
    ctx.fillText(String(score), 24, 46);
    ctx.font = "700 13px " + fontStack();
    ctx.fillStyle = "rgba(255,255,255,.5)";
    ctx.fillText("BEST " + best, 24, 66);
    // lives
    ctx.textAlign = "right";
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = i < lives ? "#ff3b57" : "rgba(255,255,255,.15)";
      ctx.font = "900 24px " + fontStack();
      ctx.fillText("♥", W - 20 - i * 30, 44);
    }
  }

  function drawCenter(title, sub) {
    ctx.fillStyle = "rgba(0,0,0,.55)"; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    ctx.font = "900 clamp(40px, 9vw, 92px) " + fontStack();
    ctx.save();
    ctx.shadowColor = "rgba(255,80,160,.6)"; ctx.shadowBlur = 30;
    ctx.fillText(title, W / 2, H / 2 - 6);
    ctx.restore();
    ctx.font = "700 18px " + fontStack();
    ctx.fillStyle = "rgba(255,255,255,.7)";
    ctx.fillText(sub.toUpperCase(), W / 2, H / 2 + 40);
  }

  requestAnimationFrame(update);
})();
</script>
</body>
</html>
